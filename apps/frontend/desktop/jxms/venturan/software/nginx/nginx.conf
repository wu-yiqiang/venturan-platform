worker_processes 1;
events {
    worker_connections 1024; # 每个工作进程连接数
}

http {
    include mime.types;
    include /etc/nginx/conf.d/*.conf;
    default_type application/octet-stream;

    # 日志格式
    # log_format  access  '$remote_addr - $remote_user [$time_local] $host "$request" '
    #               '$status $body_bytes_sent "$http_referer" '
    #               '"$http_user_agent" "$http_x_forwarded_for" "$clientip"';
    # access_log  /var/log/nginx/access.log  access; # 日志输出目录
    gzip on;
    sendfile on;

    # 链接超时时间，自动断开
    keepalive_timeout 60;

    # 虚拟主机
    server {
        # listen 8080;
        listen 443 ssl http2;
        # server_name localhost;
        server_name jxshop.shop;
        ssl_certificate     /etc/nginx/ssl/jxshop.shop_bundle.pem;
        ssl_certificate_key /etc/nginx/ssl/jxshop.shop.key;
        charset utf-8;
        # access_log  logs/localhost.access.log  access;
        # 开启gzip 压缩
        gzip on;
        gzip_disable "MSIE6";
        gzip_vary on;
        gzip_proxied any;
        # 设置压缩级别，压缩级别越高压缩时间越长  （1-9）
        gzip_comp_level 2;
        gzip_buffers 16 8k;
        gzip_static on;
        # 设置gzip所需的http协议最低版本 （HTTP/1.1, HTTP/1.0）
        gzip_http_version 1.1;
        # 设置压缩的最小字节数， 页面Content-Length获取
        gzip_min_length 1000;
        # 设置压缩文件的类型  （text/html)
        gzip_types text/plain application/javascript text/css text/javascript application/xml application/json;
        # 路由
        location ^~/scanner {
            alias /venturan/web/scanner/dist/; # Scanner PWA应用
            index index.html index.htm;
            try_files $uri $uri/ /scanner/index.html;
        }
        location ^~/jxshop {
            alias /venturan/web/jxshop/dist/; # jx前台应用
            index index.html index.htm;
            try_files $uri $uri/ /jxshop/index.html;
        }
        location ^~/jxms {
            alias /venturan/web/jxms/dist/; # jx后台管理应用
            index index.html index.htm;
            try_files $uri $uri/ /jxms/index.html;
        }
        location / {
            proxy_pass       http://127.0.0.1:9527/;
            proxy_set_header Host $host;
            proxy_set_header   X-Real-IP        $remote_addr; # 传递ip
            proxy_set_header   X-Scheme         $scheme;      # 传递协议
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        }
        # location / {
        #     root /venturan/web/jxms/dist/;
        #     index index.html index.htm;
        #     try_files $uri $uri/ /index.html;
        # }
        # 不记录静态资源的请求
        # location ~* \.(?:jpg|jpeg|gif|png|ico|woff2|js|css)$ {
        #     access_log off;
        # }
        # 限速
        # location / {
        #     limit_rate_after 500k;
        #     limit_rate 50k;
        # }

        # 禁止缓存
        # location ~* \.(js|css|png|jpg|gif)$ {
        #     # 禁止缓存
        #     add_header Cache-Control no-store;
        #     # 长期缓存
        #     # expires 1y;
        #     # add_header Cache-Control "public, immutable";
        # }
        # 添加缓存以及过期时间
        # location ~* \.(?:jpg|jpeg|gif|png|ico|woff2)$ {
        #     expires 1M;
        #     add_header Cache-Control "public";
        # }
        # 防盗链
        # location ~* \.(gif|jpg|png)$ {
        #     # 只允许 192.168.0.1 请求资源
        #     valid_referers none blocked 192.168.0.1;
        #     if ($invalid_referer) {
        #         rewrite ^/ http://$host/logo.png;
        #     }
        # }
        # 根据状态码，返回对于的错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /source/error_page;
        }

    }

    ## 配置反向代理的参数
    # server {
    #     listen    9527;
    #     location / {
    #         proxy_pass  https://127.0.0.1:9527/;
    #         proxy_redirect     off;
    #         proxy_set_header   Host             $host;        # 传递域名
    #         proxy_set_header   X-Real-IP        $remote_addr; # 传递ip
    #         proxy_set_header   X-Scheme         $scheme;      # 传递协议
    #         proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    #     }
    # }
    # 引入其他的配置文件
    include servers/*;
}